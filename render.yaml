services:
  - type: web
    name: signalscope-api
    runtime: python
    buildCommand: pip install -r requirements.txt
  startCommand: gunicorn app:app --timeout 180 --graceful-timeout 30
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        value: "https://uuper.netlify.app"
